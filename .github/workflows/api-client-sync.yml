name: API Client Sync

on:
  pull_request:
    paths:
      - 'src/docs/**'
      - 'src/routes/**'
      - 'src/index.ts'
      - 'src/scripts/generateOpenApiSpec.ts'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - 'src/docs/**'
      - 'src/routes/**'
      - 'src/index.ts'
      - 'src/scripts/generateOpenApiSpec.ts'
      - 'package.json'
      - 'package-lock.json'

jobs:
  generate-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI and frontend client
        run: npm run generate:client

      - name: Verify generated files are committed
        run: git diff --exit-code -- openapi frontend-sdk
